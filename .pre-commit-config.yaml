repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-json
        exclude: ^zed/settings\.json$
      - id: check-toml
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: detect-private-key

  # Nix formatting with Alejandra (using system binary)
  - repo: local
    hooks:
      - id: alejandra
        name: alejandra
        description: Format Nix files with Alejandra
        entry: alejandra
        language: system
        files: \.nix$
        pass_filenames: true

  # Nix flake checker
  - repo: local
    hooks:
      - id: nix-flake-check
        name: nix flake check
        entry: bash -c 'nix flake check --no-build'
        language: system
        files: \.nix$|^flake\.lock$
        pass_filenames: false

  # Security scanning with checkov
  - repo: https://github.com/bridgecrewio/checkov.git
    rev: 3.2.510
    hooks:
      - id: checkov
        args: [-d ., --quiet, --compact]

  # Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks
